<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KCRW Today's Top Tune</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <span class="mark">K</span>
            <span>Today's Top Tune</span>
          </div>
          <span class="status" id="updatedAt">Loading library</span>
        </div>
      </header>

      <main class="layout">
        <section class="player-panel" aria-label="Audio player">
          <span class="eyebrow">KCRW daily download</span>
          <h1>Fresh tracks, ready to play.</h1>
          <h2 class="now-title" id="nowTitle">Loading</h2>
          <p class="now-meta" id="nowMeta">Fetching the latest library.</p>
          <audio id="audio" controls preload="none"></audio>
          <div class="controls">
            <button class="icon-button" id="prevButton" type="button" aria-label="Previous track" title="Previous track">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6 6h2v12H6zm3 6 9-6v12z"/></svg>
            </button>
            <button class="play-button" id="playButton" type="button" aria-label="Play" data-playing="false">
              <svg class="play-icon" width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
              <svg class="pause-icon" width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
            </button>
            <button class="icon-button" id="nextButton" type="button" aria-label="Next track" title="Next track">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m6 18 9-6-9-6zm10-12h2v12h-2z"/></svg>
            </button>
            <button class="icon-button" id="shuffleButton" type="button" aria-label="Shuffle" aria-pressed="false" title="Shuffle">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17 3h4v4h-2V6.41l-4.5 4.5-1.41-1.41L17.59 5H17zm-9.5.5 4.59 4.59-1.41 1.41L6.09 4.91A3 3 0 0 0 3.97 4H3V2h.97a5 5 0 0 1 3.53 1.5M17 17.59l-4.5-4.5 1.41-1.41 4.5 4.5V15H21v6h-6v-2h2zM3 20v-2h.97a3 3 0 0 0 2.12-.88l12.5-12.5L20 6.03l-12.5 12.5A5 5 0 0 1 3.97 20z"/></svg>
            </button>
          </div>
        </section>

        <section class="library" aria-label="Track library">
          <div class="library-head">
            <h2>Library</h2>
            <input class="search" id="searchInput" type="search" placeholder="Search tracks" aria-label="Search tracks">
          </div>
          <p class="empty" id="emptyState" hidden>No tracks match that search.</p>
          <ul class="track-list" id="trackList"></ul>
        </section>
      </main>
    </div>
    <script src="./assets/app.js" type="module"></script>
  </body>
</html>
