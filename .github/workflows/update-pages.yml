name: Update KCRW library

on:
  workflow_dispatch:
  schedule:
    - cron: "20 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: kcrw-library
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update track library
        run: npm run update
        env:
          ARCHIVE_AUDIO: "true"
      - name: Commit updated library
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update KCRW track library"
          file_pattern: docs/data/tracks.json docs/tracks
